name: 🚀 Release new version

on:
  schedule:
    - cron: "0 3 * * *" # Every day at 3:00 UTC
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "release" to confirm'
        required: true

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  preparation:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: read

    outputs:
      status: ${{ steps.check.outputs.status }}
      release_version: ${{ steps.fetch-version.outputs.release_version }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Fetch release version
        id: fetch-version
        run: |
          release_version=$(npm view material-icon-theme version)
          current_version=$(npm list material-icon-theme --depth=0 | grep 'material-icon-theme@' | cut -d '@' -f 2)
          echo "release_version=$release_version" >> $GITHUB_ENV
          echo "current_version=$current_version" >> $GITHUB_ENV
          echo "release_version=$release_version" >> $GITHUB_OUTPUT

      - name: ❌ Check release conditions
        id: check
        run: |
          status="skip"
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            # Manual dispatch requires confirmation input
            if [ "${{ github.event.inputs.confirm }}" = "release" ]; then
              status="release"
            else
              echo "::error::Confirmation input must be 'release' to proceed"
              exit 1
            fi
          elif [ "$release_version" != "$current_version" ]; then
            # Scheduled run: release only if upstream has a new version
            status="release"
          fi
          echo "status=$status" >> $GITHUB_OUTPUT

  release:
    runs-on: ubuntu-latest
    needs: preparation
    if: needs.preparation.outputs.status == 'release'

    permissions:
      contents: write
      id-token: write
      actions: write

    steps:
      - name: 🤖 Use App Token for the Bot which is allowed to create releases
        # NOTE: v3.x available but requires Node 24+; upgrade when runners support it
        uses: actions/create-github-app-token@c1a285145b9d317df6ced56c09f525b5c2b6f755 # v1.11.1
        id: app-token
        with:
          app-id: ${{ vars.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}

      - name: 📥 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: 🔧 Configure Git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git config --global push.followTags true

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔄 Attempt update and prepare release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm install material-icon-theme@${{ needs.preparation.outputs.release_version }}
          npx changelogen --bump --hideAuthorEmail
          npm run update-versions

      - name: 📝 Get metadata
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: 🏗️ Build extension
        run: npm run build

      - name: 📜 Commit and Tag Release
        env:
          # Don't run husky on `git commit`
          HUSKY: 0
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git add package.json package-lock.json src/manifests/base.json CHANGELOG.md README.md
          git commit -m "chore(release): v$VERSION"
          git tag "v$VERSION"
          git push origin --follow-tags
          npx changelogen github release

      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: extension-builds
          retention-days: 7
          path: |
            github-material-icons-chrome-extension.zip
            github-material-icons-edge-extension.zip
            github-material-icons-firefox-extension.zip

      - name: ⬆️ Upload zip files to GitHub release
        run: |
          gh release upload v$VERSION github-material-icons-chrome-extension.zip github-material-icons-edge-extension.zip github-material-icons-firefox-extension.zip
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

  deploy-chrome:
    runs-on: ubuntu-latest
    needs: release
    timeout-minutes: 15
    name: "Deploy: Chrome Web Store"

    permissions:
      contents: read

    steps:
      - name: 📥 Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: extension-builds

      - name: 🌐 Upload to Chrome Web Store
        uses: trmcnvn/chrome-addon@7fc5a5ad3ff597dc64d6a13de7dcaa8515328be7 # v2
        with:
          extension: bggfcpfjbdkhfhfmkjpbhnkhnpjjeomc
          zip: github-material-icons-chrome-extension.zip
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}

  deploy-edge:
    runs-on: ubuntu-latest
    needs: release
    timeout-minutes: 15
    name: "Deploy: Edge Add-ons"

    permissions:
      contents: read

    steps:
      - name: 📥 Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: extension-builds

      - name: 🌐 Upload to Edge Add-ons
        uses: wdzeng/edge-addon@d4db1eea77297a24d799394dec87e8912e0902f9 # v2.1.0
        with:
          product-id: f95e9c6a-6470-45a1-ae09-821d3b916923
          zip-path: github-material-icons-edge-extension.zip
          client-id: ${{ secrets.EDGE_CLIENT_ID }}
          api-key: ${{ secrets.EDGE_API_KEY }}

  deploy-firefox:
    runs-on: ubuntu-latest
    needs: release
    timeout-minutes: 15
    name: "Deploy: Firefox Add-ons"

    permissions:
      contents: read

    steps:
      - name: 📥 Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: extension-builds

      - name: 📦 Unzip Firefox extension
        run: |
          mkdir -p dist/firefox
          unzip github-material-icons-firefox-extension.zip -d dist/firefox

      - name: 📦 Install web-ext
        run: npm install -g web-ext

      - name: 🌐 Upload to Firefox Add-ons
        run: npx web-ext sign -s ./dist/firefox/ --channel=listed --api-key=${{ secrets.FIREFOX_API_JWT_ISSUER }} --api-secret=${{ secrets.FIREFOX_API_JWT_SECRET }}
